<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>6BET – Frequently Asked Questions</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan:    #00E5FF;
    --purple:  #BF00FF;
    --accent:  #00E5FF;
    --border:  rgba(0,229,255,0.18);
    --text:    #E8F4FF;
    --text-dim: rgba(200,230,255,0.6);
    --radius:  8px;
    --modal-bg: rgba(4,8,24,0.97);
    --card-bg:  rgba(6,12,36,0.7);
    --grid-line: rgba(0,229,255,0.06);
  }

  /* ── Animated grid background ── */
  body {
    background-color: #020510;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
      radial-gradient(ellipse 80% 60% at 50% 0%,   rgba(191,0,255,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 100%,  rgba(0,229,255,0.14) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 20% 60%,   rgba(191,0,255,0.10) 0%, transparent 70%);
    background-size: 40px 40px, 40px 40px, 100% 100%, 100% 100%, 100% 100%;
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    padding: 40px 20px 160px;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 9998;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    position: relative;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
  }
  .header .logo-img {
    max-height: 90px;
    max-width: 260px;
    object-fit: contain;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 20px rgba(0,229,255,0.5)) drop-shadow(0 0 40px rgba(191,0,255,0.3));
  }
  .header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(0,229,255,0.6), 0 0 40px rgba(0,229,255,0.3);
  }
  .header p {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  /* Neon divider under header */
  .header::after {
    content: '';
    display: block;
    width: 160px;
    height: 1px;
    margin: 18px auto 0;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
    box-shadow: 0 0 10px var(--cyan);
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.5;
    pointer-events: none;
    color: var(--cyan);
  }
  #searchInput {
    width: 100%;
    padding: 14px 16px 14px 46px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    backdrop-filter: blur(12px);
    letter-spacing: 0.03em;
  }
  #searchInput::placeholder { color: rgba(200,230,255,0.3); }
  #searchInput:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 1px rgba(0,229,255,0.3), 0 0 20px rgba(0,229,255,0.12);
  }

  /* ── Categories ── */
  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .cat-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(0,229,255,0.04);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 4px;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .cat-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.08), rgba(191,0,255,0.08));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .cat-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,229,255,0.2), inset 0 0 12px rgba(0,229,255,0.05);
  }
  .cat-btn:hover::before { opacity: 1; }
  .cat-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,229,255,0.08);
    box-shadow: 0 0 16px rgba(0,229,255,0.25), inset 0 0 16px rgba(0,229,255,0.06);
    text-shadow: 0 0 8px rgba(0,229,255,0.8);
  }
  .cat-btn:active { transform: scale(0.97); }

  /* ── FAQ Grid ── */
  .faq-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 600px) {
    .faq-grid { grid-template-columns: 1fr; }

    /* Compact header on mobile */
    .header { margin-bottom: 20px; }
    .header .logo-img { max-height: 56px; max-width: 180px; margin-bottom: 8px; }
    .header h1 { font-size: 17px; letter-spacing: 0.08em; margin-bottom: 4px; }
    .header p { font-size: 11px; }
    .header::after { margin: 10px auto 0; width: 100px; }

    /* Smaller home cards */
    .home-card { padding: 16px 8px 14px; gap: 8px; border-radius: 12px; }
    .home-card .icon-wrap { width: 56px; height: 56px; border-radius: 14px; }
    .home-card .icon-wrap svg { width: 38px; height: 38px; }
    .home-card .label { font-size: 11px; letter-spacing: 0.06em; }
  }

  .faq-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    background: var(--card-bg);
    border: 1px solid rgba(0,229,255,0.12);
    border-radius: var(--radius);
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-size: 13.5px;
    font-weight: 500;
    line-height: 1.45;
    letter-spacing: 0.02em;
    transition: all 0.22s;
    width: 100%;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }
  /* Left neon accent bar */
  .faq-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--cyan), var(--purple));
    opacity: 0;
    transition: opacity 0.22s;
    box-shadow: 0 0 8px var(--cyan);
  }
  .faq-card:hover {
    background: rgba(0,229,255,0.06);
    border-color: rgba(0,229,255,0.4);
    box-shadow: 0 0 20px rgba(0,229,255,0.1), inset 0 0 20px rgba(0,229,255,0.03);
    transform: translateY(-1px);
    color: #fff;
  }
  .faq-card:hover::before { opacity: 1; }
  .faq-card .arrow {
    flex-shrink: 0;
    opacity: 0.4;
    color: var(--cyan);
    transition: opacity 0.2s, transform 0.2s;
  }
  .faq-card:hover .arrow {
    opacity: 1;
    transform: translateX(3px);
  }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 15px;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-box {
    background: var(--modal-bg);
    border-radius: 12px;
    width: 100%;
    max-width: 580px;
    max-height: 82vh;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(0,229,255,0.25);
    box-shadow:
      0 0 0 1px rgba(191,0,255,0.1),
      0 32px 80px rgba(0,0,0,0.8),
      0 0 60px rgba(0,229,255,0.08),
      inset 0 1px 0 rgba(0,229,255,0.1);
    animation: slideUp 0.28s cubic-bezier(0.22,1,0.36,1);
    overflow: hidden;
    position: relative;
  }
  /* Corner accents */
  .modal-box::before, .modal-box::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--cyan);
    border-style: solid;
    pointer-events: none;
    z-index: 1;
  }
  .modal-box::before { top: 0; left: 0; border-width: 2px 0 0 2px; border-radius: 12px 0 0 0; }
  .modal-box::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; border-radius: 0 0 12px 0; }

  .modal-header {
    padding: 22px 24px 18px;
    border-bottom: 1px solid rgba(0,229,255,0.1);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-shrink: 0;
    background: rgba(0,229,255,0.02);
  }
  .modal-category {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-shadow: 0 0 8px rgba(0,229,255,0.7);
  }
  .modal-question {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .modal-close {
    background: rgba(0,229,255,0.06);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 6px;
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--cyan);
    font-size: 14px;
    transition: all 0.2s;
  }
  .modal-close:hover {
    background: rgba(0,229,255,0.15);
    box-shadow: 0 0 10px rgba(0,229,255,0.3);
  }
  .modal-body {
    padding: 20px 24px 28px;
    overflow-y: auto;
    flex: 1;
    font-size: 14px;
    line-height: 1.85;
    color: rgba(200,230,255,0.85);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .modal-body::-webkit-scrollbar { width: 4px; }
  .modal-body::-webkit-scrollbar-track { background: transparent; }
  .modal-body::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); border-radius: 4px; }

  /* ── Bottom CTA bar ── */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(2,5,16,0.95);
    backdrop-filter: blur(16px);
    border-top: 1px solid rgba(0,229,255,0.15);
    box-shadow: 0 -1px 0 rgba(191,0,255,0.1), 0 -20px 40px rgba(0,0,0,0.5);
    padding: 14px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
  }
  .btn-contact {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 28px;
    background: transparent;
    border: 1px solid var(--cyan);
    border-radius: 6px;
    color: var(--cyan);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 0 14px rgba(0,229,255,0.2), inset 0 0 14px rgba(0,229,255,0.04);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-contact::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn-contact:hover {
    box-shadow: 0 0 24px rgba(0,229,255,0.4), inset 0 0 24px rgba(0,229,255,0.08);
    transform: translateY(-2px);
    text-shadow: 0 0 8px rgba(0,229,255,0.8);
  }
  .btn-contact:hover::before { opacity: 1; }

  .btn-goback {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 28px;
    background: transparent;
    border: 1px solid rgba(191,0,255,0.5);
    border-radius: 6px;
    color: rgba(200,150,255,0.9);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 0 14px rgba(191,0,255,0.15), inset 0 0 14px rgba(191,0,255,0.04);
    transition: all 0.2s;
  }
  .btn-goback:hover {
    border-color: var(--purple);
    box-shadow: 0 0 24px rgba(191,0,255,0.35), inset 0 0 24px rgba(191,0,255,0.08);
    transform: translateY(-2px);
    color: #d090ff;
  }

  /* ── Music Button ── */
  .music-btn-wrap {
    position: fixed;
    bottom: 80px;
    right: 24px;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .music-hint {
    background: rgba(2,5,16,0.92);
    border: 1px solid var(--cyan);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--cyan);
    white-space: nowrap;
    animation: pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 14px rgba(0,229,255,0.3);
    text-shadow: 0 0 8px rgba(0,229,255,0.6);
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.04); opacity: 0.8; }
  }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 10px rgba(0,229,255,0.4), 0 0 20px rgba(191,0,255,0.2); }
    50%      { box-shadow: 0 0 22px rgba(0,229,255,0.8), 0 0 40px rgba(191,0,255,0.4); }
  }
  #musicBtn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1.5px solid var(--cyan);
    background: rgba(2,5,16,0.9);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: box-shadow 0.3s;
    box-shadow: 0 0 10px rgba(0,229,255,0.2);
  }
  #musicBtn.playing { animation: glow 2s ease-in-out infinite; }
  .bars { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
  .bar { width: 3px; background: var(--cyan); border-radius: 2px; animation: bar 0.8s ease-in-out infinite; box-shadow: 0 0 4px var(--cyan); }
  .bar:nth-child(1) { animation-delay: 0s; }
  .bar:nth-child(2) { animation-delay: 0.2s; }
  .bar:nth-child(3) { animation-delay: 0.4s; }
  .bar:nth-child(4) { animation-delay: 0.1s; }
  @keyframes bar {
    0%,100% { height: 4px; }
    50% { height: 14px; }
  }

  /* ── Animated background blobs ── */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
    will-change: transform, opacity;
  }
  .bg-blob-1 {
    width: 520px; height: 520px;
    background: radial-gradient(circle, rgba(191,0,255,0.13) 0%, transparent 70%);
    top: -160px; left: -160px;
    animation: blob1 13s ease-in-out infinite alternate;
  }
  .bg-blob-2 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(0,229,255,0.09) 0%, transparent 70%);
    bottom: 80px; right: -100px;
    animation: blob2 16s ease-in-out infinite alternate;
  }
  .bg-blob-3 {
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(100,0,220,0.10) 0%, transparent 70%);
    top: 45%; left: 38%;
    animation: blob3 11s ease-in-out infinite alternate;
  }
  @keyframes blob1 {
    0%   { transform: translate(0,0)   scale(1);    opacity: 0.7; }
    50%  { transform: translate(40px,-30px) scale(1.08); opacity: 1; }
    100% { transform: translate(-20px,40px) scale(0.94); opacity: 0.8; }
  }
  @keyframes blob2 {
    0%   { transform: translate(0,0)   scale(1);    opacity: 0.6; }
    50%  { transform: translate(-35px,25px) scale(1.06); opacity: 0.9; }
    100% { transform: translate(25px,-35px) scale(0.96); opacity: 0.75; }
  }
  @keyframes blob3 {
    0%   { transform: translate(0,0)   scale(1);    opacity: 0.5; }
    50%  { transform: translate(20px,30px)  scale(1.1);  opacity: 0.85; }
    100% { transform: translate(-30px,-20px) scale(0.92); opacity: 0.6; }
  }

  /* ── Home View ── */
  #homeView, #faqView {
    position: relative;
    z-index: 1;
  }
  #homeView { animation: viewFadeIn 0.32s ease; }
  #faqView  { animation: viewFadeIn 0.32s ease; }
  @keyframes viewFadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .home-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 4px;
  }
  @media (max-width: 580px) {
    .home-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  }

  .home-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 28px 14px 22px;
    background: rgba(6,12,40,0.60);
    border: 1px solid rgba(0,229,255,0.11);
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.26s cubic-bezier(0.22,1,0.36,1);
    backdrop-filter: blur(14px);
    position: relative;
    overflow: hidden;
  }
  .home-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.07), rgba(191,0,255,0.05));
    opacity: 0;
    transition: opacity 0.26s;
    border-radius: inherit;
  }
  .home-card:hover {
    border-color: rgba(0,229,255,0.45);
    transform: translateY(-5px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.45), 0 0 32px rgba(0,229,255,0.10);
  }
  .home-card:hover::after { opacity: 1; }
  .home-card:active { transform: translateY(-2px); }

  .home-card .icon-wrap {
    width: 82px;
    height: 82px;
    background: rgba(255,255,255,0.07);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.26s;
    position: relative;
    z-index: 1;
  }
  .home-card:hover .icon-wrap {
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 24px rgba(0,229,255,0.18);
  }

  .home-card .label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(200,230,255,0.80);
    text-align: center;
    line-height: 1.3;
    transition: color 0.22s;
    position: relative;
    z-index: 1;
  }
  .home-card:hover .label {
    color: var(--cyan);
    text-shadow: 0 0 10px rgba(0,229,255,0.55);
  }

  /* ── Back button ── */
  #backBtn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    background: transparent;
    border: 1px solid rgba(0,229,255,0.28);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 22px;
    transition: all 0.2s;
  }
  #backBtn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 14px rgba(0,229,255,0.22);
  }

/* ensure container is above blobs */
  .container { position: relative; z-index: 1; }
</style>
</head>
<body>

<!-- Animated background blobs -->
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

  { question: `Can someone else request self-exclusion on my behalf?`, category: `Self Exclusion`, answer: `Generally, self-exclusion must be requested directly by the account holder to ensure consent and authenticity. However, in exceptional cases—such as vulnerability concerns—a support team may provide guidance to a concerned family member or authorized representative. Final approval still requires verification procedures to protect user privacy and prevent misuse.` }
];

const FEATURED = new Set([
  "How to Play on 6BET",
  "How Do I Complete KYC Verification?",
  "Get New Member Package - Total Up to 7,010",
  "How do I make a deposit on 6bet?",
  "How to withdraw from 6bet?",
  "What is self-exclusion?"
]);

const CATEGORY_ICONS = {
  "Account Concerns": `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" fill="#E8F4FF" stroke="#4A90D9" stroke-width="1.5"/><circle cx="12" cy="9" r="3" fill="#4A90D9"/><path d="M6 19c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/></svg>`,
  "KYC": `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="4" y="8" width="13" height="10" rx="2" fill="#FFF3E0" stroke="#F4A234" stroke-width="1.5"/><circle cx="15" cy="8" r="4" fill="#7C3AED"/><path d="M13 8l1.5 1.5L17 6.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  "Promotions": `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.5 4.5H18l-3.75 2.7 1.5 4.5L12 12l-3.75 2.7 1.5-4.5L6 7.5h4.5L12 3z" fill="#FFD700" stroke="#F4A234" stroke-width="1"/><rect x="5" y="16" width="14" height="5" rx="2" fill="#FF6B6B"/></svg>`,
  "Withdrawal": `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/><rect x="3" y="9" width="18" height="3" fill="#4CAF50"/><path d="M17 15l2 2-2 2M19 17h-5" stroke="#FF6B6B" stroke-width="1.5" stroke-linecap="round"/></svg>`,
  "Deposit": `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/><rect x="3" y="9" width="18" height="3" fill="#4CAF50"/><path d="M17 19l-2-2 2-2M15 17h5" stroke="#4CAF50" stroke-width="1.5" stroke-linecap="round"/></svg>`,
  "Self Exclusion": `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="#FFF0F0" stroke="#FF6B6B" stroke-width="1.5"/><path d="M9 9l6 6M15 9l-6 6" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/></svg>`
};

let selectedCategory = "All";

function buildCategories() {
  const cats = ["All", ...new Set(FAQ_ITEMS.map(i => i.category))];
  document.getElementById("categories").innerHTML = cats.map(c => `
    <button class="cat-btn ${c === selectedCategory ? 'active' : ''}" onclick="selectCategory('${c}')">
      ${CATEGORY_ICONS[c] || ""}${c}
    </button>
  `).join("");
}

function selectCategory(cat) {
  selectedCategory = cat;
  buildCategories();
  renderFAQ();
}

function renderFAQ() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const grid = document.getElementById("faqGrid");
  let items = FAQ_ITEMS.filter(item => {
    if (q) return item.question.toLowerCase().includes(q);
    if (selectedCategory === "All") return FEATURED.has(item.question);
    return item.category === selectedCategory;
  });
  if (items.length === 0) {
    grid.innerHTML = `<div class="no-results">No questions found matching your search.</div>`;
    return;
  }
  grid.innerHTML = items.map(item => `
    <button class="faq-card" onclick="openModal(${FAQ_ITEMS.indexOf(item)})">
      <span>${item.question}</span>
      <svg class="arrow" width="14" height="14" viewBox="0 0 20 20" fill="none">
        <path d="M7.5 5L12.5 10L7.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  `).join("");
}

function openModal(index) {
  const item = FAQ_ITEMS[index];
  document.getElementById("modalCategory").innerHTML = (CATEGORY_ICONS[item.category] || "") + item.category;
  document.getElementById("modalQuestion").textContent = item.question;
  document.getElementById("modalAnswer").textContent = item.answer;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModalDirect(); });

const MUSIC_URL = "music.mp3";
let audio = null, musicStarted = false, isMuted = false;

function toggleMusic() {
  if (!musicStarted) {
    audio = new Audio(MUSIC_URL);
    audio.loop = true;
    audio.volume = 0.4;
    audio.play().then(() => {
      musicStarted = true; isMuted = false;
      document.getElementById("musicHint").style.display = "none";
      document.getElementById("muteIcon").style.display = "none";
      document.getElementById("barsIcon").style.display = "flex";
      document.getElementById("musicBtn").classList.add("playing");
    }).catch(err => console.warn("Play failed:", err));
    return;
  }
  if (isMuted) {
    audio.muted = false; isMuted = false;
    document.getElementById("muteIcon").style.display = "none";
    document.getElementById("barsIcon").style.display = "flex";
    document.getElementById("musicBtn").classList.add("playing");
  } else {
    audio.muted = true; isMuted = true;
    document.getElementById("muteIcon").style.display = "block";
    document.getElementById("barsIcon").style.display = "none";
    document.getElementById("musicBtn").classList.remove("playing");
  }
}

function showHome() {
  document.getElementById('homeView').style.display = '';
  document.getElementById('faqView').style.display = 'none';
  selectedCategory = 'All';
  const si = document.getElementById('searchInput');
  if (si) si.value = '';
}

function showCategory(cat) {
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('faqView').style.display = '';
  buildCategories();
  selectCategory(cat);
}

showHome();
</script>
